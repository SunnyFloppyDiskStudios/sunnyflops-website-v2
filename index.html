<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>

    <meta property="og:title" content="Sunny Floppy Disk Studios">
    <meta property="og:description" content="welcome to my website!">
    <meta property="og:image" content="images/branding/floppy.svg">

    <link rel="stylesheet" href="global.css">

    <title>Sunny Floppy Disk Studios</title>
    <link rel="icon" type="image/png" href="a_assets/images/favicon/faviconDisk.png">

    <script src="https://unpkg.com/@studio-freight/lenis"></script>
</head>
<body>
<div class="page-wrapper">
    <header>
        <div id="cursor-follow"></div>

<!--        SIDEBAR-->
        <nav class="sidebar-base" id="sidebar">
            <div class="top-group">
                <h3 id="arrow">></h3>
                <input style="rotate: 90deg" type="image" src="/a_assets/images/icons/home.png" alt="home" onclick="topFunction()">
                <input style="rotate: 90deg" type="image" src="/a_assets/images/icons/stuff.png" alt="stuff" onclick="navTo('/stuff')">
                <input style="rotate: 90deg" type="image" src="/a_assets/images/icons/stack.png" alt="community" onclick="navTo('/community')">
                <input style="rotate: 90deg" type="image" src="/a_assets/images/icons/about.png" alt="about" onclick="navTo('/about')">
            </div>

            <h4>Home Page</h4>
            <img id="sb-logo" src="/a_assets/images/branding/floppy.png" alt="floppy disk logo">
        </nav>

        <nav class="sidebar-expanded">
            <div class="sidebar-top" style="flex-direction: column; display: flex">
                <h3 class="side-headers">Links</h3>
                <a class="side-links" href="https://sunnyflops.net">Home</a>
                <a class="side-links" href="https://sunnyflops.net/stuff">Stuff</a>
                <a class="side-links" href="https://sunnyflops.net/community">Community</a>
                <a class="side-links" href="https://sunnyflops.net/about">About</a>

                <h3 class="side-headers">More Links</h3>
                <a class="side-links" href="https://boredle.sunnyflops.net">boredle</a>
                <a class="side-links" href="https://onthenow.sunnyflops.net">onthenow</a>
                <a class="side-links" href="https://flopic.sunnyflops.net">FLOPIC editor</a>
            </div>

            <div class="sidebar-bottom">
                <div class="social-container">
                    <div class="socials">
                        <a href="https://github.com/SunnyFloppyDiskStudios" target="_blank"><img src="/a_assets/images/platforms/github.svg" alt="GitHub"/></a>
                        <a href="https://sunnyfloppydiskstudios.itch.io/" target="_blank"><img src="/a_assets/images/platforms/itch.svg" alt="itch.io"/></a>
                        <a href="https://www.roblox.com/users/986533440/profile" target="_blank"><img src="/a_assets/images/platforms/roblox.svg" alt="Roblox"/></a>
                    </div>

                    <div class="socials">
                        <a href="https://www.youtube.com/@SunnyFlops" target="_blank"><img src="/a_assets/images/platforms/youtube.svg" alt="YouTube"/></a>
                        <a href="https://discord.gg/SGGnUUjf7P" target="_blank"><img src="/a_assets/images/platforms/discord.svg" alt="Discord"/></a>
                        <a href="https://bsky.app/profile/sunnyflops.net" target="_blank"><img src="/a_assets/images/platforms/bsky.svg" alt="Bluesky"/></a>
                    </div>

                    <!-- cookies, legal, credits -->
                    <h4 id="yearText" style="padding-right: 15px">{ yr }</h4>
                </div>
                <h4 style="font-size: 30px">SUNNY FLOPPY DISK STUDIOS</h4>
            </div>
        </nav>
<!--        SIDEBAR-->
    </header>

    <main class="content">
        <div class="tileable-stars-black" style="align-items: center">
            <div>
                <h1 id="randomiseGreeting">{ randomiseGreeting } :)</h1>
                <h1 style="font-size: 43px">Welcome to my website!</h1>
                <h1 style="font-size: 20px; color: #FFDB58">content coming soon™</h1>
            </div>
        </div>
    </main>
</div>
</body>
<script src="global.js"></script>
<script src="index.js"></script>
</html>
